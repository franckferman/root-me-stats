name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: make build

    - name: Run tests
      run: go test -v ./...

    - name: Run vet
      run: go vet ./...

    - name: Run fmt check
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not formatted properly"
          gofmt -s -l .
          exit 1
        fi

  build-cross-platform:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build for ${{ matrix.os }}-${{ matrix.arch }}
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        make build-all
        ls -la dist/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rootme-stats-${{ matrix.os }}-${{ matrix.arch }}
        path: dist/
        retention-days: 7

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build
      run: make build

    - name: Test CLI functionality
      run: |
        # Test badge generation
        ./bin/rootme-badges --nickname=franckferman --theme=dark --output=test-badge.svg
        test -f test-badge.svg
        echo "Badge generation test passed"

        # Test CLI profile fetch
        ./bin/rootme-cli profile --nickname=franckferman --output=test-profile.json
        test -f test-profile.json
        echo "Profile fetch test passed"

        # Clean up test files
        rm -f test-badge.svg test-profile.json

    - name: Test server startup
      run: |
        # Start server in background
        ./bin/rootme-server &
        SERVER_PID=$!

        # Wait for server to start
        sleep 3

        # Test health endpoint
        curl -f http://localhost:3000/health || exit 1
        echo "Server health check passed"

        # Test themes endpoint
        curl -f http://localhost:3000/themes || exit 1
        echo "Themes endpoint test passed"

        # Clean up
        kill $SERVER_PID