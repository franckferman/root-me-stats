<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-title { fill: #ffffff; font: 600 18px 'Segoe UI', sans-serif; }
      .text-normal { fill: #ffffff; font: 400 14px 'Segoe UI', sans-serif; }
      .text-small { fill: #ffffff; font: 400 12px 'Segoe UI', sans-serif; }
      .icon { fill: #91B302; }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes progressFill {
        from { width: 0; }
        to { width: var(--progress); }
      }

      .animated { animation: fadeIn 0.8s ease-in-out; }
      .progress-bar { animation: progressFill 1.2s ease-out; }
    </style>
  </defs>
<rect width="100%" height="100%" rx="8" fill="#000000" /><rect width="100%" height="100%" rx="8" fill="none" stroke="#2A3609" stroke-width="1" /><text x="20" y="30" fill="#ffffff" font="600 16px 'Segoe UI', sans-serif">Root-me Comparison</text>
  <g>
    <text x="20" y="60" fill="#ffffff" font="400 13px 'Segoe UI', sans-serif">@franckferman</text>
    <text x="20" y="80" fill="#ffffff" font="400 11px 'Segoe UI', sans-serif">Rank: 0</text>
    <text x="20" y="100" fill="#ffffff" font="400 11px 'Segoe UI', sans-serif">Score: 0</text>
    <text x="20" y="120" fill="#ffffff" font="400 11px 'Segoe UI', sans-serif">Challenges: 0</text>
  </g>
<text x="250" y="90" fill="#91B302" font="600 18px 'Segoe UI', sans-serif" text-anchor="middle">VS</text>
  <g>
    <text x="480" y="60" fill="#ffffff" font="400 13px 'Segoe UI', sans-serif" text-anchor="end">@g0uZ</text>
    <text x="480" y="80" fill="#ffffff" font="400 11px 'Segoe UI', sans-serif" text-anchor="end">Rank: 0</text>
    <text x="480" y="100" fill="#ffffff" font="400 11px 'Segoe UI', sans-serif" text-anchor="end">Score: 0</text>
    <text x="480" y="120" fill="#ffffff" font="400 11px 'Segoe UI', sans-serif" text-anchor="end">Challenges: 0</text>
  </g>
